name: Build and Run NCS tests

on:
  pull_request:
    branches: ["**"]
    paths:
      - "include/**"
      - "src/**"
      - "samples/zephyr/**"
      - "tests/zephyr/**"
      - ".github/workflows/ncs-tests.yaml"

  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to run against (use this to target a PR head)"
        required: false
      commit_sha:
        description: "Optional commit SHA to checkout (overrides pr_number if provided)"
        required: false
      ref:
        description: "Optional branch or tag to checkout (used when not supplying pr_number or commit_sha)"
        required: false

permissions:
  contents: read

jobs:
  find-image-tag:
    runs-on: ubuntu-24.04
    outputs:
      revision: ${{ steps.revision.outputs.revision }}
      ref: ${{ steps.setref.outputs.ref }}
    steps:
      - name: Determine checkout ref
        id: setref
        run: |
          # Determine which ref we should checkout for the build
          # Priority:
          # 1. explicit commit_sha input
          # 2. explicit pr_number input -> refs/pull/<pr>/head
          # 3. if triggered by a pull_request event -> refs/pull/<pr>/head
          # 4. explicit ref input
          # 5. default github.ref
          echo "event_name=${GITHUB_EVENT_NAME}"
          if [ -n "${{ github.event.inputs.commit_sha }}" ]; then
            echo "ref=${{ github.event.inputs.commit_sha }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.pr_number }}" ]; then
            echo "ref=refs/pull/${{ github.event.inputs.pr_number }}/head" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            # use the PR head ref for pull_request events
            echo "ref=refs/pull/${{ github.event.pull_request.number }}/head" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.ref }}" ]; then
            echo "ref=${{ github.event.inputs.ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.setref.outputs.ref }}

      - name: Read NCS revision from west-ncs.yml
        id: revision
        run: |
          # Find and read revision pinned in west-ncs.yml
          REVISION=$(yq '.manifest.projects[] | select(.name == "nrf") | .revision' west-ncs.yml)
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"

  build:
    needs: find-image-tag
    runs-on: ubuntu-24.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:${{ needs.find-image-tag.outputs.revision }}
    defaults:
      run:
        # Bash shell is needed to set toolchain related environment variables in the
        # container. Workaround for https://github.com/actions/runner/issues/1964
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.find-image-tag.outputs.ref }}
          fetch-depth: 0

      # The container image does not include a full host toolchain.
      # native_sim and unit_testing tests run on the host, so they
      # require a host toolchain to be installed.
      - name: Install host build tools
        run: |
          apt-get update
          apt-get install -y build-essential

      - name: Prepare west project
        run: |
          west init -l --mf west-ncs.yml
          west update -o=--depth=1 -n

      # need this step in order to run test on nRF platforms
      - name: Fetch binary blobs
        run: west blobs fetch hubblenetwork-sdk

      - name: Run tests
        run: |
          set -euxo pipefail
          west twister -T tests/zephyr -v --inline-logs \
            --quarantine-list tools/ci/twister-quarantine.yaml

      - name: Build samples
        run: |
          set -euxo pipefail
          west twister -T samples/zephyr --build-only --integration -v \
            --inline-logs --quarantine-list tools/ci/twister-quarantine.yaml
