# Hubble Network
CONFIG_HUBBLE_SAT_NETWORK=y

# Decode the base64 master key (CONFIG_SAMPLE_HUBBLE_KEY) on the device.
CONFIG_BASE64=y

# Logging, so predicted-pass times and status are visible.
CONFIG_LOG=y

# Interactive shell for telemetry commands ("sat status", "sat next").
CONFIG_SHELL=y

# Pass geometry (elevation, longitude) is printed as floats by "sat next".
CONFIG_CBPRINTF_FP_SUPPORT=y

# Use the device uptime counter source so the device needs no UTC provisioning
# for crypto. Pass prediction tracks wall-clock separately (build time + uptime).
CONFIG_HUBBLE_COUNTER_SOURCE_DEVICE_UPTIME=y

# This sample transmits opportunistically and needs no NVS; disable nonce-reuse
# enforcement (which would persist the sequence counter to NVS).
CONFIG_HUBBLE_NETWORK_SECURITY_ENFORCE_NONCE_CHECK=n

CONFIG_MAIN_STACK_SIZE=2048
