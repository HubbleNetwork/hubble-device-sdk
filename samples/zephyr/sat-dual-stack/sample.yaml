sample:
  description: Hubble Network dual-stack (BLE beacon + satellite) example
  name: hubble-sat-dual-stack
common:
  build_only: true
  depends_on:
    - ble
  tags:
    - bluetooth
    - satellite
  platform_allow:
    - native_sim
tests:
  app.sat.dual_stack.default:
      extra_configs:
      - CONFIG_SAMPLE_PROVIDE_SAT_BOARD_SUPPORT=y
  app.sat.dual_stack.debug:
    extra_configs:
      - CONFIG_HUBBLE_SAMPLE_DEBUG=y
      - CONFIG_SAMPLE_PROVIDE_SAT_BOARD_SUPPORT=y
  app.sat.dual_stack.128key:
    extra_configs:
      - CONFIG_HUBBLE_NETWORK_KEY_128=y
      - CONFIG_SAMPLE_PROVIDE_SAT_BOARD_SUPPORT=y
  app.sat.dual_stack.mbedtls:
    extra_configs:
      - CONFIG_HUBBLE_NETWORK_CRYPTO_MBEDTLS=y
      - CONFIG_SAMPLE_PROVIDE_SAT_BOARD_SUPPORT=y
  app.sat.dual_stack.mbedtls_128key:
    extra_configs:
      - CONFIG_HUBBLE_NETWORK_CRYPTO_MBEDTLS=y
      - CONFIG_HUBBLE_NETWORK_KEY_128=y
      - CONFIG_SAMPLE_PROVIDE_SAT_BOARD_SUPPORT=y
